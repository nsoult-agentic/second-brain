# Second Brain — PostgreSQL + pgvector + Capture Service
# Deploy: Portainer -> Stacks -> Add from Repository -> GitOps polling
# CI/CD: GitHub Actions builds capture image on push, updates tag automatically
#
# Required env vars (set via .env or Portainer):
#   POSTGRES_PASSWORD  — PostgreSQL admin password
#   OLLAMA_URL         — Ollama HTTP endpoint for classify + embed
#   NTFY_URL           — ntfy server URL for notifications

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: second-brain-db
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - /srv/second-brain/postgres:/var/lib/postgresql/data
      - /srv/second-brain/init:/docker-entrypoint-initdb.d:ro
      - /srv/second-brain/backups:/backups
      - /etc/localtime:/etc/localtime:ro
    environment:
      POSTGRES_DB: second_brain
      POSTGRES_USER: pai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: America/Los_Angeles
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pai -d second_brain"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  capture:
    image: ghcr.io/nsoult-agentic/second-brain:sha-4879a26
    container_name: second-brain-capture
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

    # -- Security Hardening --
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    # -- Resource Limits --
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"

    # -- Filesystem --
    volumes:
      - /srv/second-brain-capture/secrets:/secrets:ro
    tmpfs:
      - /tmp:size=64m,noexec,nosuid

    # -- Health Check --
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:9098/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    # -- Environment --
    environment:
      DB_HOST: second-brain-db
      DB_PORT: "5432"
      DB_NAME: second_brain
      DB_USER: capture_writer
      DB_PASSWORD_FILE: /secrets/db-password
      OLLAMA_URL: ${OLLAMA_URL}
      OLLAMA_CLASSIFY_MODEL: hermes3:8b
      OLLAMA_EMBED_MODEL: nomic-embed-text
      MATRIX_SECRET_FILE: /secrets/matrix.json
      NTFY_URL: ${NTFY_URL}
      HEALTH_PORT: "9098"
      LOG_LEVEL: info
      # NEVER put passwords here — read from /secrets/
