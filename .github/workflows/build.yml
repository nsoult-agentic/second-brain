name: Build second-brain

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "package.json"
      - "Dockerfile"
      - "tsconfig.json"

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set short SHA
        id: sha
        run: echo "short=$(echo '${{ github.sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/second-brain:sha-${{ steps.sha.outputs.short }}
            ghcr.io/${{ github.repository_owner }}/second-brain:latest

      - name: Update compose with new image tag
        run: |
          sed -i "s|image:.*second-brain.*|image: ghcr.io/${{ github.repository_owner }}/second-brain:sha-${{ steps.sha.outputs.short }}|" \
            docker-compose.yml

      - name: Commit and push compose update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docker-compose.yml
          git diff --staged --quiet || git commit -m "ci: update second-brain image tag [skip ci]"
          git push
